<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for better visual appeal -->
    <radialGradient id="faceGradient" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#fdd5c4"/>
      <stop offset="100%" stop-color="#fdbcb4"/>
    </radialGradient>
    <linearGradient id="potGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d2752f"/>
      <stop offset="50%" stop-color="#b8622d"/>
      <stop offset="100%" stop-color="#8b4513"/>
    </linearGradient>
    <radialGradient id="leafGradient" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </radialGradient>
    
    <!-- Hover animation -->
    <style>
      .logo-hover:hover .plant-leaves { transform: scale(1.05); transition: transform 0.3s ease; }
      .logo-hover:hover .character-face { transform: scale(1.02); transition: transform 0.3s ease; }
      .logo-hover:hover .butterflies { animation: flutter 2s ease-in-out infinite; }
      @keyframes flutter {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-2px); }
      }
    </style>
  </defs>
  
  <g class="logo-hover">
    <!-- Background circle with subtle shadow -->
    <circle cx="60" cy="60" r="58" fill="#f8f8f5" stroke="#2d2d2d" stroke-width="2"/>
    <circle cx="60" cy="60" r="56" fill="none" stroke="#e5e5e0" stroke-width="1" opacity="0.5"/>
    
    <!-- Top text "MERO GAMALA" -->
    <path id="top-curve" d="M 18 32 A 42 42 0 0 1 102 32" fill="none"/>
    <text font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2d2d2d" letter-spacing="1px">
      <textPath href="#top-curve" startOffset="50%" text-anchor="middle">
        MERO GAMALA
      </textPath>
    </text>
    
    <!-- Pot with gradient and rim detail -->
    <path d="M 40 75 L 80 75 L 76 92 L 44 92 Z" fill="url(#potGradient)" stroke="#654321" stroke-width="1"/>
    <rect x="40" y="72" width="40" height="6" fill="#d2752f" rx="1"/>
    <rect x="38" y="70" width="44" height="4" rx="2" fill="#8b4513"/>
    <ellipse cx="60" cy="72" rx="21" ry="2" fill="#a0522d" opacity="0.3"/>
    
    <!-- Soil with texture -->
    <ellipse cx="60" cy="75" rx="18" ry="3" fill="#4a4a4a"/>
    <ellipse cx="60" cy="74" rx="16" ry="2" fill="#5a5a5a"/>
    
    <!-- Plant stems with curves -->
    <g class="plant-leaves">
      <path d="M 54 75 Q 48 65 46 52" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M 60 75 Q 58 58 56 42" stroke="#16a34a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M 66 75 Q 72 65 74 52" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      
      <!-- Enhanced leaves with better shapes -->
      <ellipse cx="46" cy="49" rx="5" ry="9" fill="url(#leafGradient)" transform="rotate(-25 46 49)"/>
      <ellipse cx="51" cy="45" rx="4" ry="7" fill="#22c55e" transform="rotate(15 51 45)"/>
      <ellipse cx="56" cy="39" rx="5" ry="8" fill="url(#leafGradient)" transform="rotate(-15 56 39)"/>
      <ellipse cx="60" cy="37" rx="4" ry="7" fill="#22c55e" transform="rotate(20 60 37)"/>
      <ellipse cx="64" cy="42" rx="5" ry="8" fill="url(#leafGradient)" transform="rotate(30 64 42)"/>
      <ellipse cx="69" cy="47" rx="4" ry="7" fill="#22c55e" transform="rotate(-20 69 47)"/>
      <ellipse cx="74" cy="49" rx="5" ry="9" fill="url(#leafGradient)" transform="rotate(25 74 49)"/>
      
      <!-- Leaf veins for detail -->
      <path d="M 46 44 L 46 54" stroke="#15803d" stroke-width="0.5" opacity="0.7"/>
      <path d="M 56 34 L 56 44" stroke="#15803d" stroke-width="0.5" opacity="0.7"/>
      <path d="M 74 44 L 74 54" stroke="#15803d" stroke-width="0.5" opacity="0.7"/>
    </g>
    
    <!-- Character with improved features -->
    <g class="character-face">
      <!-- Face with gradient -->
      <circle cx="60" cy="55" r="13" fill="url(#faceGradient)" stroke="#e8b4a6" stroke-width="0.5"/>
      
      <!-- Hair with more detail -->
      <path d="M 47 48 Q 60 32 73 48 Q 73 42 60 37 Q 47 42 47 48" fill="#2d2d2d"/>
      <circle cx="51" cy="50" r="3.5" fill="#2d2d2d"/>
      <ellipse cx="49" cy="52" rx="2" ry="1" fill="#2d2d2d" transform="rotate(-20 49 52)"/>
      
      <!-- Eyes with more expression -->
      <ellipse cx="55" cy="52" rx="2" ry="3" fill="#2d2d2d"/>
      <ellipse cx="65" cy="52" rx="2" ry="3" fill="#2d2d2d"/>
      <circle cx="54.5" cy="51" r="0.5" fill="white"/>
      <circle cx="65.5" cy="51" r="0.5" fill="white"/>
      
      <!-- Enhanced blush -->
      <ellipse cx="51" cy="58" rx="2.5" ry="1.5" fill="#ff9999" opacity="0.6"/>
      <ellipse cx="69" cy="58" rx="2.5" ry="1.5" fill="#ff9999" opacity="0.6"/>
      
      <!-- Improved smile -->
      <path d="M 55 61 Q 60 66 65 61" stroke="#2d2d2d" stroke-width="2" fill="none" stroke-linecap="round"/>
      
      <!-- Arms holding the pot -->
      <circle cx="44" cy="66" r="5" fill="url(#faceGradient)"/>
      <circle cx="76" cy="66" r="5" fill="url(#faceGradient)"/>
      <!-- Sleeves -->
      <path d="M 47 63 Q 56 59 59 63" stroke="#c2410c" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M 61 63 Q 64 59 73 63" stroke="#c2410c" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
    
    <!-- Decorative elements around -->
    <g class="decorative-leaves">
      <ellipse cx="23" cy="43" rx="3" ry="6" fill="#22c55e" transform="rotate(-35 23 43)"/>
      <ellipse cx="28" cy="38" rx="2" ry="5" fill="#16a34a" transform="rotate(15 28 38)"/>
      <ellipse cx="97" cy="43" rx="3" ry="6" fill="#22c55e" transform="rotate(35 97 43)"/>
      <ellipse cx="92" cy="38" rx="2" ry="5" fill="#16a34a" transform="rotate(-15 92 38)"/>
    </g>
    
    <!-- Enhanced butterflies -->
    <g class="butterflies" transform="translate(12,32) scale(0.7)">
      <ellipse cx="0" cy="0" rx="4" ry="7" fill="#ff8c00" transform="rotate(-25 0 0)"/>
      <ellipse cx="3" cy="0" rx="4" ry="7" fill="#ffa500" transform="rotate(25 3 0)"/>
      <ellipse cx="0" cy="5" rx="3" ry="5" fill="#ff8c00" transform="rotate(-25 0 5)"/>
      <ellipse cx="3" cy="5" rx="3" ry="5" fill="#ffa500" transform="rotate(25 3 5)"/>
      <line x1="1.5" y1="-2" x2="1.5" y2="10" stroke="#2d2d2d" stroke-width="1"/>
      <circle cx="1.5" cy="-2" r="1" fill="#2d2d2d"/>
      <!-- Wing patterns -->
      <circle cx="1" cy="2" r="1" fill="#ff6b00" opacity="0.7"/>
      <circle cx="2" cy="2" r="1" fill="#ff6b00" opacity="0.7"/>
    </g>
    
    <g class="butterflies" transform="translate(103,32) scale(0.7)">
      <ellipse cx="0" cy="0" rx="4" ry="7" fill="#ff8c00" transform="rotate(-25 0 0)"/>
      <ellipse cx="3" cy="0" rx="4" ry="7" fill="#ffa500" transform="rotate(25 3 0)"/>
      <ellipse cx="0" cy="5" rx="3" ry="5" fill="#ff8c00" transform="rotate(-25 0 5)"/>
      <ellipse cx="3" cy="5" rx="3" ry="5" fill="#ffa500" transform="rotate(25 3 5)"/>
      <line x1="1.5" y1="-2" x2="1.5" y2="10" stroke="#2d2d2d" stroke-width="1"/>
      <circle cx="1.5" cy="-2" r="1" fill="#2d2d2d"/>
      <!-- Wing patterns -->
      <circle cx="1" cy="2" r="1" fill="#ff6b00" opacity="0.7"/>
      <circle cx="2" cy="2" r="1" fill="#ff6b00" opacity="0.7"/>
    </g>
    
    <!-- Bottom text (Nepali) with better positioning -->
    <path id="bottom-curve" d="M 20 100 A 40 40 0 0 0 100 100" fill="none"/>
    <text font-family="Arial, sans-serif" font-size="9" fill="#2d2d2d" font-weight="500">
      <textPath href="#bottom-curve" startOffset="50%" text-anchor="middle">
        मायाले हुर्काउँदा बिरुवाहरू
      </textPath>
    </text>
  </g>
</svg>