<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERO GAMALA - Site Status</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #10b981 0%, #065f46 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .status {
            font-size: 1.5rem;
            margin: 20px 0;
        }
        .status.working {
            color: #10b981;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            font-weight: bold;
        }
        .asset-test {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        .asset-test h3 {
            margin-bottom: 10px;
        }
        .asset-status {
            display: inline-block;
            padding: 5px 15px;
            margin: 5px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .asset-status.ok {
            background: #10b981;
            color: white;
        }
        .asset-status.error {
            background: #ef4444;
            color: white;
        }
        .links {
            margin-top: 30px;
        }
        .links a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            padding: 10px 20px;
            border: 2px solid white;
            border-radius: 25px;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .links a:hover {
            background: white;
            color: #10b981;
        }
        .timestamp {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 MERO GAMALA</h1>
        <p class="status working">✅ SITE IS OPERATIONAL</p>
        
        <div class="asset-test">
            <h3>📦 Asset Status Check</h3>
            <div id="asset-results">
                <div class="asset-status" id="js-status">Checking JS...</div>
                <div class="asset-status" id="css-status">Checking CSS...</div>
                <div class="asset-status" id="favicon-status">Checking Favicon...</div>
            </div>
        </div>
        
        <div class="links">
            <a href="index.html">🏠 Main Site</a>
            <a href="test.html">🧪 Test Page</a>
        </div>
        
        <div class="timestamp">
            Last checked: <span id="timestamp"></span>
        </div>
    </div>

    <script>
        // Update timestamp
        document.getElementById('timestamp').textContent = new Date().toLocaleString();
        
        // Test asset loading
        function testAsset(url, elementId, name) {
            const element = document.getElementById(elementId);
            
            fetch(url, { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        element.textContent = `✅ ${name} OK`;
                        element.className = 'asset-status ok';
                    } else {
                        element.textContent = `❌ ${name} Error (${response.status})`;
                        element.className = 'asset-status error';
                    }
                })
                .catch(error => {
                    element.textContent = `❌ ${name} Failed`;
                    element.className = 'asset-status error';
                });
        }
        
        // Test main assets
        testAsset('/merogamala/assets/index-CKB3iL2z.js', 'js-status', 'JavaScript');
        testAsset('/merogamala/assets/index-h13a9WDX.css', 'css-status', 'CSS');
        testAsset('/merogamala/favicon.svg', 'favicon-status', 'Favicon');
    </script>
</body>
</html>
