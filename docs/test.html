<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERO GAMALA - Test Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #10b981 0%, #065f46 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 15px;
        }
        .status {
            font-weight: bold;
            color: #10b981;
            background: white;
            padding: 10px 20px;
            border-radius: 25px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 MERO GAMALA</h1>
        <p>GitHub Pages Test Page</p>
        <div class="status">✅ SITE IS WORKING!</div>
        <p style="margin-top: 20px;">
            <a href="index.html" style="color: white; text-decoration: underline;">
                Go to Main Site →
            </a>
        </p>
        <p style="font-size: 0.9em; opacity: 0.8;">
            Time: <span id="time"></span>
        </p>
    </div>
    
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
