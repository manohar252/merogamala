<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="80" viewBox="0 0 240 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="240" height="80" fill="#ffffff" rx="8"/>
  
  <!-- Plant icon on the left -->
  <g transform="translate(20, 40)">
    <!-- Pot -->
    <path d="M-8 5 L-6 15 L6 15 L8 5 Z" fill="#8b4513"/>
    <ellipse cx="0" cy="5" rx="8" ry="2" fill="#a0522d"/>
    
    <!-- Plant stems and leaves -->
    <g>
      <!-- Main stem -->
      <rect x="-1" y="-10" width="2" height="15" fill="#228b22"/>
      
      <!-- Left leaf -->
      <ellipse cx="-5" cy="-8" rx="4" ry="6" fill="#32cd32" transform="rotate(-15)"/>
      
      <!-- Right leaf -->
      <ellipse cx="5" cy="-8" rx="4" ry="6" fill="#32cd32" transform="rotate(15)"/>
      
      <!-- Top leaf -->
      <ellipse cx="0" cy="-15" rx="5" ry="7" fill="#32cd32"/>
      
      <!-- Leaf veins -->
      <path d="M0 -22 L0 -8" stroke="#228b22" stroke-width="0.5"/>
      <path d="M-5 -14 L-2 -8" stroke="#228b22" stroke-width="0.5"/>
      <path d="M5 -14 L2 -8" stroke="#228b22" stroke-width="0.5"/>
    </g>
  </g>
  
  <!-- Main brand text -->
  <g transform="translate(50, 35)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#1e40af" letter-spacing="2px">
      MERO
    </text>
    <text x="0" y="25" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#dc2626" letter-spacing="2px">
      GAMALA
    </text>
  </g>
  
  <!-- Alternative horizontal layout -->
  <!-- <g transform="translate(50, 45)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#1e40af" letter-spacing="1.5px">
      MERO
    </text>
    <text x="70" y="0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#dc2626" letter-spacing="1.5px">
      GAMALA
    </text>
  </g> -->
  
  <!-- Small tagline -->
  <text x="50" y="55" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#6b7280" letter-spacing="0.5px">
    Premium Plants for Your Space
  </text>
  
  <!-- Decorative elements -->
  <g opacity="0.7">
    <!-- Small leaf accent -->
    <path d="M200 20 Q205 15 210 20 Q205 25 200 20" fill="#10b981"/>
    <path d="M210 25 Q215 20 220 25 Q215 30 210 25" fill="#10b981"/>
    
    <!-- Another leaf accent -->
    <path d="M200 55 Q205 50 210 55 Q205 60 200 55" fill="#10b981"/>
    <path d="M210 60 Q215 55 220 60 Q215 65 210 60" fill="#10b981"/>
  </g>
  
  <!-- Border -->
  <rect width="240" height="80" fill="none" stroke="#e5e7eb" stroke-width="1" rx="8"/>
</svg>